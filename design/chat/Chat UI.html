<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AutoStream — Chat UI</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../shared/tokens.css">
<style>
  body { background: #f0eee9; }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="ios-frame.jsx"></script>
<script type="text/babel" src="conversation.jsx"></script>
<script type="text/babel" src="web-chat.jsx"></script>
<script type="text/babel" src="whatsapp-chat.jsx"></script>

<script type="text/babel">
function App() {
  return (
    <DesignCanvas>
      <DCSection id="web" title="Custom web chat widget" subtitle="Embedded on autostream.video — floating bottom-right, dark-first, orange-accent">
        <DCArtboard id="web-greeting" label="01 · Greeting" width={420} height={680}>
          <div style={{ width: '100%', height: '100%', background: '#0A0A0A', padding: 20, display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
            <WebChatWidget width={380} height={620} upThroughIndex={0} />
          </div>
        </DCArtboard>
        <DCArtboard id="web-rag" label="02 · RAG answer" width={420} height={680}>
          <div style={{ width: '100%', height: '100%', background: '#0A0A0A', padding: 20, display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
            <WebChatWidget width={380} height={620} upThroughIndex={2} />
          </div>
        </DCArtboard>
        <DCArtboard id="web-qualifying" label="03 · Qualifying" width={420} height={680}>
          <div style={{ width: '100%', height: '100%', background: '#0A0A0A', padding: 20, display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
            <WebChatWidget width={380} height={620} upThroughIndex={6} />
          </div>
        </DCArtboard>
        <DCArtboard id="web-confirming" label="04 · Confirming" width={420} height={680}>
          <div style={{ width: '100%', height: '100%', background: '#0A0A0A', padding: 20, display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
            <WebChatWidget width={380} height={620} upThroughIndex={8} />
          </div>
        </DCArtboard>
        <DCArtboard id="web-captured" label="05 · Captured" width={420} height={680}>
          <div style={{ width: '100%', height: '100%', background: '#0A0A0A', padding: 20, display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
            <WebChatWidget width={380} height={620} upThroughIndex={11} />
          </div>
        </DCArtboard>
      </DCSection>

      <DCSection id="whatsapp" title="WhatsApp Business" subtitle="Same agent, different transport. Quick-replies map 1:1 onto WA interactive buttons.">
        <DCArtboard id="wa-greeting" label="01 · Greeting" width={402} height={874}>
          <IOSDevice width={402} height={874} dark={false}>
            <WhatsAppChat upThroughIndex={0} />
          </IOSDevice>
        </DCArtboard>
        <DCArtboard id="wa-rag" label="02 · RAG answer" width={402} height={874}>
          <IOSDevice width={402} height={874} dark={false}>
            <WhatsAppChat upThroughIndex={2} />
          </IOSDevice>
        </DCArtboard>
        <DCArtboard id="wa-confirming" label="03 · Confirming" width={402} height={874}>
          <IOSDevice width={402} height={874} dark={false}>
            <WhatsAppChat upThroughIndex={8} />
          </IOSDevice>
        </DCArtboard>
        <DCArtboard id="wa-captured" label="04 · Captured" width={402} height={874}>
          <IOSDevice width={402} height={874} dark={false}>
            <WhatsAppChat upThroughIndex={11} />
          </IOSDevice>
        </DCArtboard>
      </DCSection>

      <DCSection id="embedded" title="Embedded on page" subtitle="The widget in situ, floating over a marketing page. This is the intended deployment on autostream.video.">
        <DCArtboard id="embedded-page" label="In context" width={1200} height={780}>
          <div style={{ width: '100%', height: '100%', background: '#0A0A0A', position: 'relative', overflow: 'hidden', fontFamily: 'Inter, sans-serif' }}>
            {/* Mock marketing page */}
            <div style={{ padding: '40px 60px' }}>
              <div style={{ display: 'flex', alignItems: 'center', gap: 10, marginBottom: 60 }}>
                <div style={{ width: 28, height: 28, borderRadius: 4, background: '#FF5A1F', display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
                  <svg width="16" height="16" viewBox="0 0 20 20" fill="none"><rect x="3" y="6" width="10" height="8" rx="1" fill="#0A0A0A"/><path d="M13 9 L17 6 V14 L13 11 Z" fill="#0A0A0A"/></svg>
                </div>
                <span style={{ fontFamily: 'Space Grotesk, sans-serif', fontWeight: 600, fontSize: 18, color: '#F5F1EA', letterSpacing: '-0.02em' }}>autostream</span>
                <div style={{ flex: 1 }} />
                <div style={{ display: 'flex', gap: 28, fontSize: 13, color: '#A8A29E', fontFamily: 'JetBrains Mono, monospace', letterSpacing: '0.04em' }}>
                  <span>FEATURES</span><span>PRICING</span><span>DOCS</span><span style={{ color: '#FF5A1F' }}>SIGN IN</span>
                </div>
              </div>
              <div style={{ fontFamily: 'JetBrains Mono, monospace', fontSize: 11, color: '#FF5A1F', letterSpacing: '0.14em', textTransform: 'uppercase', marginBottom: 20 }}>
                [ automated video editing for creators ]
              </div>
              <h1 style={{ fontFamily: 'Space Grotesk, sans-serif', fontSize: 108, fontWeight: 600, color: '#F5F1EA', letterSpacing: '-0.04em', margin: 0, lineHeight: 0.95, maxWidth: 900 }}>
                Ship videos.<br/>Not edits.
              </h1>
              <p style={{ fontSize: 18, color: '#A8A29E', maxWidth: 520, marginTop: 28, lineHeight: 1.5 }}>
                AutoStream turns raw footage into ready-to-post videos in minutes.
                4K, captions, platform-native cuts — no timeline required.
              </p>
            </div>
            {/* Floating widget */}
            <div style={{ position: 'absolute', bottom: 28, right: 28 }}>
              <WebChatWidget width={360} height={560} upThroughIndex={4} showStateRail={false} />
            </div>
          </div>
        </DCArtboard>
      </DCSection>

      <DCSection id="components" title="UI components" subtitle="Bubbles, chips, state pills — the vocabulary of the chat surface.">
        <DCArtboard id="comp-bubbles" label="Bubbles" width={460} height={340}>
          <div style={{ width: '100%', height: '100%', background: '#0A0A0A', padding: 24, display: 'flex', flexDirection: 'column', gap: 14 }}>
            <div className="micro" style={{ fontFamily: 'JetBrains Mono, monospace', fontSize: 10, letterSpacing: '0.14em', textTransform: 'uppercase', color: '#6B6660' }}>Agent</div>
            <AgentBubble text="The Pro Plan is $79/month — unlimited edits, 4K, AI captions, 24/7 support." />
            <AgentBubble showTypingDots />
            <div className="micro" style={{ fontFamily: 'JetBrains Mono, monospace', fontSize: 10, letterSpacing: '0.14em', textTransform: 'uppercase', color: '#6B6660', marginTop: 4 }}>User</div>
            <UserBubble text="That sounds great, I want to sign up." />
          </div>
        </DCArtboard>
        <DCArtboard id="comp-chips" label="Quick-reply chips" width={460} height={340}>
          <div style={{ width: '100%', height: '100%', background: '#0A0A0A', padding: 24, display: 'flex', flexDirection: 'column', gap: 16 }}>
            <div style={{ fontFamily: 'JetBrains Mono, monospace', fontSize: 10, letterSpacing: '0.14em', textTransform: 'uppercase', color: '#6B6660' }}>Top-funnel</div>
            <QuickReplies labels={["Tell me about pricing", "Compare plans", "I want to sign up"]} />
            <div style={{ fontFamily: 'JetBrains Mono, monospace', fontSize: 10, letterSpacing: '0.14em', textTransform: 'uppercase', color: '#6B6660', marginTop: 8 }}>Platform</div>
            <QuickReplies labels={["YouTube", "Instagram", "TikTok", "Twitch"]} />
            <div style={{ fontFamily: 'JetBrains Mono, monospace', fontSize: 10, letterSpacing: '0.14em', textTransform: 'uppercase', color: '#6B6660', marginTop: 8 }}>Confirm</div>
            <QuickReplies labels={["Yes, submit", "Fix something"]} />
          </div>
        </DCArtboard>
        <DCArtboard id="comp-states" label="Phase badges" width={460} height={340}>
          <div style={{ width: '100%', height: '100%', background: '#0A0A0A', padding: 24, display: 'flex', flexDirection: 'column', gap: 14 }}>
            <div style={{ fontFamily: 'JetBrains Mono, monospace', fontSize: 10, letterSpacing: '0.14em', textTransform: 'uppercase', color: '#6B6660', marginBottom: 4 }}>Phase machine</div>
            {['browsing','qualifying','confirming','captured'].map(p => (
              <div key={p} style={{ display: 'flex', alignItems: 'center', gap: 16, padding: '10px 14px', background: '#141414', border: '1px solid #262626', borderRadius: 8 }}>
                <PhaseBadge phase={p} />
                <div style={{ flex: 1, height: 1, background: '#262626' }} />
                <div style={{ fontFamily: 'JetBrains Mono, monospace', fontSize: 11, color: '#A8A29E' }}>
                  {p === 'browsing' && 'no slots'}
                  {p === 'qualifying' && 'collecting 1/3'}
                  {p === 'confirming' && '3/3 → awaiting yes'}
                  {p === 'captured' && 'mock_lead_capture()'}
                </div>
              </div>
            ))}
          </div>
        </DCArtboard>
      </DCSection>
    </DesignCanvas>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
